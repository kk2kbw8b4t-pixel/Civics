<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Civics FAQ Website</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
const faqs = [
{
      question: "What is the purpose of the proposed monitor system?",
      answer:
        "The system is designed to improve bathroom supervision while allowing staff members to focus more on teaching, grading, and lesson preparation.",
    },
    {
      question: "",
      answer: "Great Idea right?",
    },
    {
      question: "What responsibilities would student monitors have?",
      answer:
        "Student monitors would supervise bathroom stations during their assigned period and help maintain organization and accountability.",
    },
    {
      question: "",
      answer: "Definitely Should be implemented",
    },
    {
      question: "Would students be compensated?",
      answer:
        "Yes. Students would receive community service hours for their participation, but only after completing the hours responsibly and on time.",
    },
    {
      question: "",
      answer: "Very Plausible",
    },
    {
      question: "Why are community service hours connected to the program?",
      answer:
        "Observation has shown that many students struggle to complete community service hours. This program provides an opportunity for students to earn them in a structured way.",
    },
    {
      question: "",
      answer: "The people need their hours, right?",
    },
    {
      question: "Would there be adult supervision?",
      answer:
        "Yes. A staff member would remain present to ensure fairness and prevent any student from holding authority over others.",
    },
    {
      question: "",
      answer: "Couldn't possibly fail.",
    },
    {
      question: "What are the eligibility requirements?",
      answer:
        "The Sophomores, Juniors, and Seniors eligible for this position must have the following apply to themself: Minimum a 3.0 GPA, has a study and has signed up to monitor during said study block(s), has fewer than 3 missing assignments across all classes in the current quarter, mustn’t have already completed their required community service hours, and either an email of recommendation or a signed recommendation note from a teacher",
    },
    {
      question: "",
      answer: "Million Dollar Idea",
    },
    {
      question: "Why are academic requirements included?",
      answer:
        "The requirements help ensure that students involved are responsible, trustworthy, and not negatively impacted academically by participation.",
    },
    {
      question: "More Questions?",
      answer: "Email matthewga2027@bridge-rayn.org",
    },
    {
      question: "More Questions?",
      answer: "Email matthewga2027@bridge-rayn.org",
    },
    {
      question: "Can students lose their position?",
      answer:
        "Yes. Students who fail to meet expectations, misuse authority, or stop meeting academic requirements may lose their monitoring privileges.",
    },
];

function App() {
// Tells the browser to use React's built-in state hook directly
const [activeIndex, setActiveIndex] = React.useState(null);

return (
<div className="max-w-3xl mx-auto my-12 p-6 bg-white rounded-xl shadow-lg">
<h1 className="text-3xl font-extrabold text-gray-900 mb-8 text-center border-b pb-4">
Civics FAQ Project Portal
</h1>
<div className="space-y-4">
{faqs.map((faq, index) => (
<div key={index} className="border-b border-gray-200 pb-4">
<button
className="w-full flex justify-between items-center text-left text-lg font-semibold text-gray-700 hover:text-blue-600 focus:outline-none py-2"
onClick={() => setActiveIndex(activeIndex === index ? null : index)}
>
<span>{faq.question}</span>
<span className="text-xl text-gray-400">
{activeIndex === index ? "−" : "+"}
</span>
</button>
{activeIndex === index && (
<p className="mt-2 text-gray-600 text-base leading-relaxed pl-2 border-l-2 border-blue-500 bg-gray-50 p-3 rounded">
{faq.answer}
</p>
)}
</div>
))}
</div>
</div>
);
}
</script>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
